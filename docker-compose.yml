services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: dpsg
      POSTGRES_PASSWORD: dpsg
      POSTGRES_DB: dpsg_news
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  postgres-test:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: dpsg
      POSTGRES_PASSWORD: dpsg
      POSTGRES_DB: dpsg_news_test
    ports:
      - '5433:5432'
    volumes:
      - postgres-test-data:/var/lib/postgresql/data

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - DATABASE_URL=postgres://dpsg:dpsg@postgres:5432/dpsg_news
    volumes:
      - ./server:/usr/src/app

volumes:
  postgres-data:
  postgres-test-data:
