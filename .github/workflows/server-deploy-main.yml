name: Server Deploy Main

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  DOCKER_IMAGE_REPO: sapza/dpsgnews

jobs:
  build_and_push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: sapza
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare image tag
        id: meta
        run: |
          image="${DOCKER_IMAGE_REPO}:${GITHUB_SHA}"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ env.DOCKER_IMAGE_REPO }}:latest

  deploy:
    name: Deploy on Linux host via SSH
    runs-on: ubuntu-latest
    needs: build_and_push
    if: github.ref_name == 'main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync deployment files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "server/deploy/docker-compose.server.yml,server/deploy/Caddyfile"
          target: "/opt/dpsg-news"
          strip_components: 2

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE: ${{ needs.build_and_push.outputs.image }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          envs: IMAGE,DOCKERHUB_TOKEN
          script: |
            set -eu
            cd /opt/dpsg-news
            echo "$DOCKERHUB_TOKEN" | docker login -u "sapza" --password-stdin
            docker pull "$IMAGE"
            SERVER_IMAGE="$IMAGE" docker compose --env-file /opt/dpsg-news/.env -f docker-compose.server.yml up -d --remove-orphans
            docker image prune -f
