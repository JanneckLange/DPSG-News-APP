<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DPSG News - Rechtliches</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --surface: #ffffff;
        --text: #122033;
        --muted: #50617a;
        --line: #d8e0ea;
        --accent: #0b6ef3;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", "Helvetica Neue", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      main {
        max-width: 760px;
        margin: 48px auto;
        padding: 24px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 24px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.8rem;
      }

      p {
        color: var(--muted);
        line-height: 1.6;
      }

      a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
      }

      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>DPSG News - Rechtliche Informationen</h1>
        <p>
          Diese Seite wird ueber GitHub Pages bereitgestellt und enthaelt die
          Datenschutzinformationen zur App.
        </p>
        <p><a href="./datenschutz.html">Zur Datenschutzerklaerung</a></p>
      </section>
    </main>
  </body>
</html>
